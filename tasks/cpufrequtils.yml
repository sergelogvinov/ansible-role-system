---

- name: package cpufreq utils
  become: true
  apt:
    name: "{{ system_cpufrequtils }}"
  when: system_cpufrequtils != ""
  tags: ['system']

- name: configure cpu governor
  become: true
  when: not (ansible_facts['virtualization_role'] is defined and ansible_facts['virtualization_role'] != "host")
  tags: ['system']
  block:
    - name: configure cpufrequtils
      template:
        src: cpufrequtils.j2
        dest: /etc/default/cpufrequtils
      when: system_cpufrequtils == "cpufrequtils"
      tags: ['system']

