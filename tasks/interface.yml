---

- name: discovery network sr-iov pf
  stat:
    path: "/sys/bus/pci/devices/{{ ansible_facts[item].pciid }}/sriov_numvfs"
  when: item != 'ovs-system' and ansible_facts[item] is defined
    and ansible_facts[item].type == 'ether' and ansible_facts[item].pciid is defined
    and (ansible_facts[item].module|default('') in system_network_sriov)
  with_items: "{{ ansible_facts['interfaces'] }}"
  register: probe
  tags: ['system','network','udev']

- name: set system_network_sriov_pf list
  set_fact:
    system_network_sriov_pf: "{{ system_network_sriov_pf|default({}) | combine( {item.item: item.stat.exists} ) }}"
  when: item.stat is defined and item.stat.exists
  with_items:
    - "{{ probe.results }}"
  tags: ['system','network','udev']

- name: pin network interface name (udev)
  become: true
  template:
    src: interfaces-persistent-net-udev.j2
    dest: /etc/udev/rules.d/70-persistent-net.rules
  when: system_network_pin|bool
  tags: ['system','network','udev']

- name: ensure folder exist
  become: true
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  when: system_service_mgr == 'systemd'
  with_items:
    - /etc/systemd/network
    - /etc/systemd/system/networking.service.d

- name: replace network config
  become: true
  template:
    src: "{{ system_network_interface }}"
    dest: /etc/network/interfaces
  when: ansible_facts['os_family'] == "Debian"
  tags: ['system','network']

- name: Systemd-networkd
  become: true
  when: system_service_mgr == 'systemd' and system_networkd is defined
  tags: ['system','network']
  block:
    - name: systemd-networkd bonding netdev
      template:
        src: systemd.netdev.j2
        dest: /etc/systemd/network/25-{{ item }}.netdev
        owner: systemd-network
        mode: 0640
      when: system_networkd is defined and system_networkd.bonds is defined and item in system_networkd.bonds
      with_items: "{{ system_networkd.bonds.keys() | list }}"

    - name: systemd-networkd bridges netdev
      template:
        src: systemd.netdev.j2
        dest: /etc/systemd/network/25-{{ item }}.netdev
        owner: systemd-network
        mode: 0640
      when: system_networkd is defined and system_networkd.bridges is defined and item in system_networkd.bridges
      with_items: "{{ system_networkd.bridges.keys() | list }}"

    - name: systemd-networkd bonding slave interfaces
      template:
        src: systemd.network-slave.j2
        dest: /etc/systemd/network/20-{{ item }}.network
        owner: systemd-network
        mode: 0640
      when: system_networkd is defined and (system_networkd.bonds is defined or system_networkd.bridges is defined)
        and not item.startswith('tap') and not item.startswith('fw')
      with_items: "{{ ansible_facts['interfaces'] }}"

    - name: systemd-networkd bonding network
      template:
        src: systemd.network.j2
        dest: /etc/systemd/network/25-{{ item }}.network
        owner: systemd-network
        mode: 0640
      when: system_networkd is defined and system_networkd.bonds is defined
      with_items: "{{ system_networkd.bonds.keys() | list }}"

    - name: systemd-networkd bridges network
      template:
        src: systemd.network.j2
        dest: /etc/systemd/network/30-{{ item }}.network
        owner: systemd-network
        mode: 0640
      when: system_networkd is defined and system_networkd.bridges is defined
      with_items: "{{ system_networkd.bridges.keys() | list }}"

    - name: systemd-networkd network
      template:
        src: systemd.network.j2
        dest: /etc/systemd/network/25-{{ item }}.network
        owner: systemd-network
        mode: 0640
      when: system_networkd is defined and system_networkd.interfaces is defined
      with_items: "{{ system_networkd.interfaces.keys() | list }}"

